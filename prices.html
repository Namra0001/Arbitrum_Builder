<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Live cryptocurrency prices for ETH, BTC, and more from CoinGecko">
  <title>Live Prices | Arbitrum Builder</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo-link">
        <img src="assets/logo.svg" alt="Arbitrum Builder Logo" width="40" height="40">
        <span>Arbitrum Builder</span>
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
      <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="concepts.html">Concepts</a>
        <a href="prices.html" class="active">Live Prices</a>
        <a href="simulator.html">Block Simulator</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="page-banner">
      <div class="container">
        <h1>Live Crypto Prices</h1>
        <p>Real-time market data powered by the CoinGecko</p>
      </div>
    </div>

    <section class="section">
      <div class="container">
        <div class="prices-toolbar">
          <span class="last-updated" id="lastUpdated">Loading prices...</span>
          <button class="btn btn-primary" id="refreshBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 4v6h-6M1 20v-6h6" />
              <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" />
            </svg>
            Refresh Prices
          </button>
        </div>

        <div class="error-banner" id="errorBanner"></div>

        <div class="prices-grid" id="pricesGrid">
          <!-- Price cards rendered by JavaScript -->
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="assets/logo.svg" alt="Arbitrum Builder" width="28" height="28">
        <span>Arbitrum Builder</span>
      </div>
      <div class="footer-info">
        Built by <strong>Namra Dabhi</strong> &middot;
        Batch: <strong>Arbitrum Builder Pods</strong> &middot;
        <a href="https://github.com/yourusername/arbitrum-builder" target="_blank" rel="noopener">GitHub</a>
      </div>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="concepts.html">Concepts</a>
        <a href="prices.html">Prices</a>
        <a href="simulator.html">Simulator</a>
      </div>
    </div>
  </footer>

  <script src="js/nav.js"></script>
  <script src="js/prices.js"></script>
</body>

</html>
